name: Render daily planet card

on:
  schedule:
    # Runs once a day at 06:00 UTC. TRMNL_WEBHOOK_URL allows up to 12
    # pushes/hour, so this schedule has huge headroom -- adjust freely.
    - cron: "0 6 * * *"
  workflow_dispatch: {}  # lets you manually trigger a run from the Actions tab

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright's Chromium
        run: playwright install --with-deps chromium

      - name: Render card
        run: python render_card.py --out output/card.png

      - name: Push image to TRMNL
        env:
          TRMNL_WEBHOOK_URL: ${{ secrets.TRMNL_WEBHOOK_URL }}
        run: |
          curl -f -X POST \
            -H "Content-Type: image/png" \
            --data-binary @output/card.png \
            "$TRMNL_WEBHOOK_URL"
